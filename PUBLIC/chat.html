<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with EXA Bot</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        body,
        html {
            height: 100%;
            overflow: hidden;
            background: var(--bg-darker);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .bot-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .bot-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--grad-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .bg-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        .chat-messages {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            max-width: 75%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bubble {
            padding: 1rem 1.25rem;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .bot .bubble {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-top-left-radius: 0;
            color: var(--text-main);
        }

        .user .bubble {
            background: var(--primary);
            color: white;
            border-top-right-radius: 0;
        }

        .avatar-sm {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 1rem;
            flex-shrink: 0;
            align-self: flex-end;
            margin-bottom: 0.25rem;
        }

        .user .avatar-sm {
            background: var(--secondary);
        }

        .time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            display: block;
        }

        .user .time {
            text-align: right;
        }

        .chat-input-area {
            padding: 1.5rem;
            background: var(--bg-dark);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 0.5rem;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            font-size: 1rem;
            outline: none;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-send:hover {
            transform: scale(1.05);
            background: var(--primary-hover);
        }

        .btn-send:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            border-top-left-radius: 0;
            width: fit-content;
            margin-left: 64px;
            /* Align with bubbles */
            display: none;
        }

        .typing-indicator.active {
            display: flex;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="glow-blob blob-3" style="top: -20%; right: -10%;"></div>
    <div class="glow-blob blob-1" style="bottom: -20%; left: -10%;"></div>

    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray hover:text-white transition" title="Back to Dashboard">
                    <i data-lucide="arrow-left"></i>
                </a>
                <div class="bot-info">
                    <div class="bot-avatar shadow-glow">
                        <i data-lucide="bot" style="color: white;"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">EXA Support Bot</h2>
                        <div class="text-xs text-green flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-green bg-pulse"></span> Online
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-3">
                <button class="btn btn-ghost btn-icon"><i data-lucide="phone" style="width: 18px;"></i></button>
                <button class="btn btn-ghost btn-icon"><i data-lucide="more-vertical" style="width: 18px;"></i></button>
            </div>
        </header>

        <!-- Messages Area -->
        <main class="chat-messages" id="chatArea">

            <div class="text-center text-xs text-gray my-4">Today</div>

            <!-- Initial Bot Message -->
            <div class="message bot">
                <div class="avatar-sm"><i data-lucide="bot" style="width: 18px; color: white;"></i></div>
                <div>
                    <div class="bubble">
                        Hi there! 👋 Welcome to EXA AI. I'm your virtual assistant.<br><br>
                        I can help you with pricing, features, API documentation, or resetting your password. What can I
                        assist you with today?
                    </div>
                    <span class="time">Just now</span>
                </div>
            </div>

            <!-- Typing indicator slot -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

        </main>

        <!-- Input Area -->
        <footer class="chat-input-area">
            <form id="chatForm">
                <div class="input-wrapper">
                    <button type="button" class="btn btn-ghost px-3 text-gray hover:text-white" title="Attach file">
                        <i data-lucide="paperclip" style="width: 20px;"></i>
                    </button>
                    <input type="text" id="messageInput" class="chat-input" placeholder="Type your message..."
                        autocomplete="off">
                    <button type="button" class="btn btn-ghost px-3 text-gray hover:text-white" title="Voice input">
                        <i data-lucide="mic" style="width: 20px;"></i>
                    </button>
                    <button type="submit" class="btn-send text-white" id="sendBtn" disabled>
                        <i data-lucide="send" style="width: 20px; margin-left: -2px;"></i>
                    </button>
                </div>
            </form>
            <div class="text-center mt-2 text-xs text-gray flex items-center justify-center gap-1">
                Powered by <i data-lucide="zap" class="text-primary" style="width: 12px;"></i> EXA AI
            </div>
        </footer>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
    <script src="js/chat.js"></script>
</body>

</html>
<script type="module">
  import { protectPage } from "./auth-guard.js";
  protectPage();
</script>
<button id="logoutBtn">Logout</button>
<p id="userEmail"></p>
<p id="verificationStatus"></p>
