<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EXA AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            z-index: 10;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            padding-left: 2.5rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: white;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        .input-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            display: flex;
        }

        .password-toggle:hover {
            color: white;
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.875rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .social-login {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-social {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 0.6rem;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: white;
            font-size: 0.875rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        /* Error message styling */
        .error-msg {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>

<body class="dark-theme">

    <div class="auth-container">
        <!-- Background Blobs -->
        <div class="glow-blob blob-1" style="top: 0; left: 0;"></div>
        <div class="glow-blob blob-2" style="bottom: 0; right: 0;"></div>

        <div class="glass-card auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo justify-center mb-6 inline-flex">
                    <i data-lucide="bot" class="logo-icon"></i>
                    EXA <span>AI</span>
                </a>
                <h1 class="text-2xl font-bold mb-2">Welcome back</h1>
                <p class="text-gray text-sm">Sign in to your account to continue.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="form-input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="form-input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <div class="error-msg" id="loginError">Invalid credentials. For simulation, just submit.</div>
                </div>

                <a href="#" class="forgot-link">Forgot password?</a>

                <button type="submit" class="btn btn-primary w-full shadow-glow py-3">Sign In</button>
            </form>

            <div class="divider">or continue with</div>

            <div class="social-login">
                <button class="btn-social">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" width="18" height="18" alt="Google">
                    Google
                </button>
                <button class="btn-social">
                    <img src="https://www.svgrepo.com/show/512317/github-142.svg" style="filter: invert(1)" width="18"
                        height="18" alt="GitHub">
                    GitHub
                </button>
            </div>

            <p class="text-center text-sm text-gray mt-6">
                Don't have an account? <a href="signup.html" class="text-primary hover:underline">Sign up</a>
            </p>
        </div>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>

</body>

<!-- Application logic -->
<script type="module">
  import { login } from "./js/auth-service.js";
  import { redirectIfLoggedIn } from "./js/auth-guard.js";

  document.addEventListener("DOMContentLoaded", () => {
    redirectIfLoggedIn();

    const form = document.getElementById("loginForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await login(email, password);
        window.location.replace("dashboard.html");
      } catch (error) {
        document.getElementById("loginError").style.display = "block";
      }
    });
  });
</script>
</html>
